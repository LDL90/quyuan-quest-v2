<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>屈原端午亲子公园探秘</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", sans-serif; background: #0a0e1a; color: #e8dcc8; min-height: 100vh; overflow-x: hidden; }
#cvs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
.wrap { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 20px; min-height: 100vh; }
.hd { text-align: center; padding: 30px 0 20px; }
.hd h1 { font-size: 28px; color: #d4a24e; text-shadow: 0 0 20px rgba(212,162,78,0.5); margin-bottom: 10px; }
.hd p { font-size: 14px; color: #5a8a6a; }
.pg { padding: 20px 0; }
.page { text-align: center; padding: 20px; }
.seal { width: 120px; height: 120px; border: 3px solid #c0392b; border-radius: 50%; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; font-size: 60px; animation: pulse 3s ease-in-out infinite; }
.page h2 { color: #d4a24e; font-size: 24px; margin-bottom: 20px; }
.intro { font-size: 14px; line-height: 2; color: #8a7e6a; margin-bottom: 30px; }
.intro em { color: #5a8a6a; font-style: normal; }
.btn { display: inline-block; padding: 15px 50px; background: linear-gradient(135deg, #d4a24e, #c0392b); border: none; border-radius: 25px; color: #fff; font-size: 18px; cursor: pointer; transition: all 0.3s; }
.btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(212,162,78,0.5); }
.npc { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #d4a24e, #c0392b); display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 20px; animation: float 3s ease-in-out infinite; }
.dlg { background: rgba(26,26,46,0.9); border: 1px solid #d4a24e; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: left; }
.dlg p { font-size: 15px; line-height: 1.8; }
input { width: 80%; max-width: 300px; padding: 15px; background: rgba(26,26,46,0.8); border: 2px solid #d4a24e; border-radius: 10px; color: #e8dcc8; font-size: 16px; text-align: center; outline: none; margin-bottom: 20px; }
input:focus { box-shadow: 0 0 15px rgba(212,162,78,0.3); }
.qst { font-size: 18px; color: #d4a24e; margin: 20px 0; }
.opt { max-width: 400px; margin: 0 auto; }
.op { display: flex; align-items: center; padding: 15px; margin: 10px 0; background: rgba(26,26,46,0.8); border: 2px solid #1a1a2e; border-radius: 10px; cursor: pointer; transition: all 0.3s; }
.op:hover { border-color: #d4a24e; transform: translateX(5px); }
.op.cor { border-color: #5a8a6a; background: rgba(90,138,106,0.2); }
.op.wrg { border-color: #c0392b; animation: shake 0.5s; }
.op .on { width: 30px; height: 30px; border-radius: 50%; background: #d4a24e; color: #0a0e1a; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; }
.op .ot { flex: 1; font-size: 15px; text-align: left; }
.inp textarea { width: 100%; max-width: 400px; height: 120px; background: rgba(26,26,46,0.8); border: 2px solid #d4a24e; border-radius: 10px; padding: 15px; color: #e8dcc8; font-size: 15px; resize: none; outline: none; margin-bottom: 20px; }
.pop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
.pop.act { display: flex; }
.pc { background: linear-gradient(135deg, #0a0e1a, #1a1a2e); border: 2px solid #d4a24e; border-radius: 20px; padding: 30px; max-width: 90%; width: 400px; text-align: center; }
.pc h2 { color: #d4a24e; font-size: 24px; margin-bottom: 15px; }
.pc .clue { background: rgba(212,162,78,0.1); border: 1px solid #d4a24e; border-radius: 10px; padding: 15px; margin: 15px 0; }
.pc .clue h3 { color: #5a8a6a; font-size: 18px; }
.cert { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
.cert.act { display: flex; }
.cc { background: #e8dcc8; color: #0a0e1a; border-radius: 20px; padding: 40px; max-width: 90%; width: 500px; text-align: center; }
.cc h2 { font-size: 28px; color: #c0392b; margin-bottom: 20px; }
.cc .info { text-align: left; margin: 20px 0; }
.cc .info p { font-size: 16px; margin: 10px 0; }
.cc .seal { width: 80px; height: 80px; margin: 20px auto; border: 3px solid #c0392b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #c0392b; transform: rotate(-15deg); }
.admin { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 300; align-items: center; justify-content: center; }
.admin.act { display: flex; }
.ac { background: #1a1a2e; border: 2px solid #d4a24e; border-radius: 20px; padding: 30px; max-width: 90%; width: 500px; max-height: 80vh; overflow-y: auto; }
.ac h2 { color: #d4a24e; margin-bottom: 20px; }
.ac .stat { background: rgba(26,26,46,0.5); padding: 15px; border-radius: 10px; margin: 10px 0; text-align: left; }
.ac .stat p { font-size: 14px; margin: 5px 0; }
.ac .btn { margin: 10px 5px; padding: 10px 20px; font-size: 14px; }
.ac .record { background: rgba(26,26,46,0.5); padding: 10px; border-radius: 8px; margin: 8px 0; text-align: left; font-size: 13px; }
.ac .record:hover { background: rgba(212,162,78,0.1); }
.music-toggle { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: rgba(26,26,46,0.9); border: 2px solid #d4a24e; color: #d4a24e; font-size: 20px; cursor: pointer; z-index: 50; display: flex; align-items: center; justify-content: center; }
.music-toggle:hover { background: #d4a24e; color: #0a0e1a; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(212,162,78,0.3); } 50% { box-shadow: 0 0 30px 10px rgba(212,162,78,0.15); } }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
@media print { body { background: #fff !important; } .cert { display: flex !important; position: static; background: #fff; } .cert .cc { background: #fff; } .wrap, .pop, .admin, .music-toggle { display: none !important; } }
</style>
</head>
<body>
<canvas id="cvs"></canvas>
<div class="wrap">
  <div class="hd">
    <h1>屈原端午亲子公园探秘</h1>
    <p>穿越千年，探寻屈原精神</p>
  </div>
  <div class="pg" id="pg"></div>
</div>
<div class="pop" id="pop"><div class="pc" id="pc"></div></div>
<div class="cert" id="cert"><div class="cc" id="cc"></div></div>
<div class="admin" id="admin"><div class="ac" id="ac"></div></div>
<button class="music-toggle" id="musicBtn" onclick="toggleMusic()">🔇</button>

<script>
// ============ 音频系统 ============
const AudioSys = {
  enabled: false,
  bgm: null,
  currentTrack: 0,
  
  // 使用Web Audio API生成音效
  playCorrect() {
    if (!this.enabled) return;
    this.playTone(523.25, 0.1, 0.3); // C5
    setTimeout(() => this.playTone(659.25, 0.1, 0.3), 100); // E5
    setTimeout(() => this.playTone(783.99, 0.2, 0.3), 200); // G5
  },
  
  playWrong() {
    if (!this.enabled) return;
    this.playTone(200, 0.3, 0.3); // 低音
  },
  
  playWin() {
    if (!this.enabled) return;
    [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => {
      setTimeout(() => this.playTone(freq, 0.2, 0.3), i * 150);
    });
  },
  
  playTone(freq, duration, vol) {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  },
  
  // 背景音乐 - 使用简单的循环旋律
  startBGM(level) {
    if (!this.enabled) return;
    this.stopBGM();
    
    const melodies = [
      [262, 294, 330, 349, 330, 294, 262], // 序章 - 神秘
      [330, 392, 440, 392, 330, 294, 262], // 香草 - 清新
      [440, 494, 523, 494, 440, 392, 349], // 龙舟 - 激昂
      [349, 330, 294, 262, 294, 330, 349], // 粽子 - 温馨
      [523, 494, 440, 392, 440, 494, 523], // 离骚 - 悲壮
      [262, 330, 392, 523, 392, 330, 262]  // 终章 - 升华
    ];
    
    const melody = melodies[level] || melodies[0];
    let noteIndex = 0;
    
    this.bgm = setInterval(() => {
      if (!this.enabled) return;
      this.playTone(melody[noteIndex], 0.4, 0.15);
      noteIndex = (noteIndex + 1) % melody.length;
    }, 500);
  },
  
  stopBGM() {
    if (this.bgm) {
      clearInterval(this.bgm);
      this.bgm = null;
    }
  }
};

function toggleMusic() {
  AudioSys.enabled = !AudioSys.enabled;
  document.getElementById('musicBtn').textContent = AudioSys.enabled ? '🔊' : '🔇';
  if (AudioSys.enabled && S.level < L.length) {
    AudioSys.startBGM(S.level);
  } else {
    AudioSys.stopBGM();
  }
}

// ============ Canvas粒子背景 ============
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
let w, h, particles = [];
const cols = ['#d4a24e','#c0392b','#5a8a6a'];
function resize() { w = cvs.width = window.innerWidth; h = cvs.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
class Particle {
  constructor() { this.reset(); }
  reset() { this.x = Math.random() * w; this.y = Math.random() * h; this.size = Math.random() * 2 + 1; this.speed = Math.random() * 0.5 + 0.2; this.angle = Math.random() * Math.PI * 2; this.color = cols[Math.floor(Math.random() * cols.length)]; this.alpha = Math.random() * 0.5 + 0.3; }
  update() { this.y -= this.speed; this.x += Math.sin(this.angle) * 0.3; this.angle += 0.01; if (this.y < -10) { this.reset(); this.y = h + 10; } }
  draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.globalAlpha = this.alpha; ctx.fill(); ctx.globalAlpha = 1; }
}
for (let i = 0; i < 50; i++) particles.push(new Particle());
function animate() { ctx.clearRect(0, 0, w, h); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
animate();

// ============ 数据 ============
const C = { pwd: '8023', npc: ['🧙','👨‍🏫','🧑‍✈️','👩‍🍳','🎭','📜'] };
const L = [
  { id:0, name:'序章', title:'穿越楚国', npc:'屈原', q:'屈原是哪个国家的人？', opts:['楚国','秦国','赵国','魏国'], ans:0, clue:'楚国印记', story:'我是楚国大夫屈原。小朋友，你知道我是哪个国家的人吗？' },
  { id:1, name:'第二关', title:'香草美人', npc:'婵娟', q:'屈原用"香草"比喻什么？', opts:['高洁品格','美貌女子','珍贵香料','宫廷装饰'], ans:0, clue:'香草之谜', story:'先生常以香草自喻。他说："扈江离与辟芷兮，纫秋兰以为佩。"你知道这是什么意思吗？' },
  { id:2, name:'第三关', title:'龙舟之谜', npc:'渔父', q:'划龙舟是为了什么？', opts:['纪念屈原','祈求雨水的祭祀','训练水军','庆祝丰收'], ans:0, clue:'龙魂传承', story:'每年五月初五，江上龙舟竞渡，鼓声震天。你知道这是为了纪念谁吗？' },
  { id:3, name:'第四关', title:'粽子传奇', npc:'老妪', q:'投粽子入江是为了什么？', opts:['让鱼虾不咬屈原','喂饱河神保平安','祭祀龙王爷','送给屈原当干粮'], ans:0, clue:'千年粽香', story:'我老公公说啊，当年百姓怕江里的鱼虾伤害屈大夫，就用竹叶包了糯米团子投进江里。' },
  { id:4, name:'第五关', title:'千古绝唱', npc:'宋玉', q:'屈原最著名的作品是？', opts:['《离骚》','《天问》','《九歌》','《怀沙》'], ans:0, clue:'离骚长歌', story:'先生的《离骚》是中国文学史上最长的政治抒情诗，共373句、2490字。' },
  { id:5, name:'终章', title:'屈原精神', npc:'屈原', q:'写下你对屈原精神的感悟', opts:[], ans:-1, clue:'全部碎片', story:'感谢你一路探寻我的故事。最后，请告诉我——屈原精神最打动你的是什么？', isText:true }
];

// ============ 状态 ============
const VERSION = '2.2';
let S = { name:'', level:0, score:0, start:null, clues:[], answers:[], started:false, v:VERSION };
const pg = document.getElementById('pg');

// ============ 存储 ============
function save() { localStorage.setItem('qy_quest', JSON.stringify(S)); }
function load() {
  const d = localStorage.getItem('qy_quest');
  if (d) {
    const loaded = JSON.parse(d);
    if (loaded.v !== VERSION) { S = { name:'', level:0, score:0, start:null, clues:[], answers:[], started:false, v:VERSION }; save(); }
    else S = loaded;
  }
}

// ============ 页面 ============
function showStart() {
  AudioSys.stopBGM();
  pg.innerHTML = `<div class="page"><div class="seal">🐉</div><h2>屈原端午探秘记</h2><div class="intro"><em>楚国郢都</em>，一位伟大的诗人正站在汨罗江畔……<br>他留下了千古诗篇，也留下了端午的传说。<br>今天，你和爸爸妈妈将化身为<em>探秘小使者</em>，<br>跟随屈原的足迹，完成6道神秘关卡！</div><button class="btn" onclick="startGame()">开 始 探 秘</button><p style="font-size:12px;color:#3a3530;margin-top:15px">适合5-12岁亲子家庭 · 约45分钟</p></div>`;
}

function startGame() { 
  S.started = true; 
  S.start = Date.now(); 
  save(); 
  AudioSys.startBGM(0);
  showName(); 
}

function showName() {
  pg.innerHTML = `<div class="page"><div class="npc">🏮</div><div class="dlg"><p>欢迎来到屈原端午亲子公园探秘！<br>我是你的向导，请告诉我你的名字，我们即将穿越千年，探寻屈原的足迹…</p></div><h2>小朋友，你叫什么名字？</h2><input type="text" id="nameInput" placeholder="请输入姓名" maxlength="20"><br><button class="btn" onclick="submitName()">开始探秘</button></div>`;
  document.getElementById('nameInput').focus();
}

function submitName() {
  const n = document.getElementById('nameInput').value.trim();
  if (!n) { alert('请输入名字'); return; }
  S.name = n; save(); showLevel();
}

function showLevel() {
  AudioSys.startBGM(S.level);
  const l = L[S.level];
  if (!l) { showCert(); return; }
  if (l.isText) {
    pg.innerHTML = `<div class="page"><div class="npc">${C.npc[l.id]}</div><div class="dlg"><p>${l.story}</p></div><div class="qst">${l.q}</div><div class="inp"><textarea id="textAns" placeholder="请写下你的感悟…（至少10字）" maxlength="500"></textarea></div><button class="btn" onclick="submitText()">提交感悟</button></div>`;
  } else {
    let opts = '';
    l.opts.forEach((o, i) => { opts += `<div class="op" data-i="${i}" onclick="checkAns(${i})"><div class="on">${String.fromCharCode(65+i)}</div><div class="ot">${o}</div></div>`; });
    pg.innerHTML = `<div class="page"><div class="npc">${C.npc[l.id]}</div><div class="dlg"><p>${l.story}</p></div><div class="qst">${l.q}</div><div class="opt">${opts}</div></div>`;
  }
}

function checkAns(i) {
  const l = L[S.level];
  const ops = document.querySelectorAll('.op');
  ops.forEach(op => op.style.pointerEvents = 'none');
  if (i === l.ans) {
    ops[i].classList.add('cor');
    AudioSys.playCorrect();
    S.score++; S.clues.push(l.clue); S.answers.push({ level: l.id, correct: true, answer: i });
    save();
    setTimeout(() => showPop(true), 600);
  } else {
    ops[i].classList.add('wrg');
    AudioSys.playWrong();
    S.answers.push({ level: l.id, correct: false, answer: i });
    save();
    setTimeout(() => { ops[i].classList.remove('wrg'); ops.forEach(op => op.style.pointerEvents = 'auto'); }, 600);
  }
}

function submitText() {
  const t = document.getElementById('textAns').value.trim();
  if (!t || t.length < 10) { alert('请至少输入10个字'); return; }
  AudioSys.playCorrect();
  S.clues.push(L[S.level].clue); S.answers.push({ level: L[S.level].id, correct: true, answer: t });
  save(); showPop(true);
}

function showPop(isCorrect) {
  const l = L[S.level];
  const pop = document.getElementById('pop');
  const pc = document.getElementById('pc');
  pc.innerHTML = `<h2>🎉 答对了！</h2><div class="clue"><h3>✨ 获得线索碎片 ✨</h3><p style="font-size:20px;color:#d4a24e;margin:10px 0;">【${l.clue}】</p></div><p>${S.level < L.length - 1 ? '点击下方按钮继续探秘' : '恭喜你集齐全部线索碎片！'}</p><button class="btn" onclick="nextLevel()">${S.level < L.length - 1 ? '继续探秘' : '查看证书'}</button>`;
  pop.classList.add('act');
}

function nextLevel() {
  document.getElementById('pop').classList.remove('act');
  S.level++; save(); showLevel();
}

function showCert() {
  AudioSys.stopBGM();
  AudioSys.playWin();
  const cert = document.getElementById('cert');
  const cc = document.getElementById('cc');
  const total = L.length - 1;
  const correct = S.score;
  const pct = Math.round((correct / total) * 100);
  const duration = Math.round((Date.now() - S.start) / 1000);
  const mins = Math.floor(duration / 60);
  const secs = duration % 60;
  const stars = pct >= 80 ? '⭐⭐⭐' : pct >= 60 ? '⭐⭐' : '⭐';
  cc.innerHTML = `<h2>🏆 探秘证书 🏆</h2><p style="font-size:20px;margin:20px 0;color:#c0392b;">屈原端午亲子公园探秘</p><div class="info"><p><strong>姓名：</strong>${S.name}</p><p><strong>正确率：</strong>${pct}% ${stars}（${correct}/${total}）</p><p><strong>用时：</strong>${mins}分${secs}秒</p><p><strong>日期：</strong>${new Date().toLocaleDateString('zh-CN')}</p></div><div class="seal">屈原祠<br>纪念</div><p style="font-size:12px;color:#999;margin-top:20px;">线索碎片：${S.clues.join('、')}</p><button class="btn" onclick="window.print()">打印证书</button><button class="btn" style="background:#c0392b;margin-left:10px;" onclick="resetGame()">重新挑战</button>`;
  cert.classList.add('act');
  saveRecord({ name: S.name, score: pct, time: duration, date: new Date().toISOString(), clues: S.clues.length });
}

function saveRecord(r) {
  let recs = JSON.parse(localStorage.getItem('qy_recs') || '[]');
  recs.push(r);
  localStorage.setItem('qy_recs', JSON.stringify(recs));
}

function resetGame() {
  if (!confirm('确定要重新开始吗？')) return;
  S = { name:'', level:0, score:0, start:null, clues:[], answers:[], started:false, v:VERSION };
  localStorage.removeItem('qy_quest');
  document.getElementById('cert').classList.remove('act');
  showStart();
}

// ============ 管理员面板 ============
function showAdmin() {
  const pwd = prompt('请输入管理员密码：');
  if (pwd !== C.pwd) { alert('密码错误！'); return; }
  const admin = document.getElementById('admin');
  const ac = document.getElementById('ac');
  const recs = JSON.parse(localStorage.getItem('qy_recs') || '[]');
  let h = `<h2>管理员面板</h2>`;
  if (recs.length === 0) {
    h += `<p>暂无数据</p>`;
  } else {
    const avg = Math.round(recs.reduce((a, r) => a + r.score, 0) / recs.length);
    const full = recs.filter(r => r.score === 100).length;
    h += `<div class="stat"><p><strong>总参与人数：</strong>${recs.length}</p><p><strong>平均分：</strong>${avg}%</p><p><strong>满分人数：</strong>${full}</p></div><h3 style="color:#d4a24e;margin:20px 0 10px;">详细记录</h3>`;
    recs.forEach((r, i) => { 
      h += `<div class="record" onclick="previewCert(${i})"><p><strong>${i+1}. ${r.name}</strong> | ${r.score}% | ${Math.floor(r.time/60)}分${r.time%60}秒 | ${new Date(r.date).toLocaleDateString('zh-CN')}</p><p style="font-size:11px;color:#888;margin-top:5px;">💡 点击预览证书</p></div>`; 
    });
    h += `<button class="btn" onclick="exportCSV()">导出CSV</button><button class="btn" onclick="clearData()">清空数据</button>`;
  }
  h += `<button class="btn" style="background:#5a8a6a;margin-top:10px;" onclick="document.getElementById('admin').classList.remove('act')">关闭</button>`;
  ac.innerHTML = h;
  admin.classList.add('act');
}

// 预览证书
function previewCert(index) {
  const recs = JSON.parse(localStorage.getItem('qy_recs') || '[]');
  const r = recs[index];
  if (!r) return;
  
  const stars = r.score >= 80 ? '⭐⭐⭐' : r.score >= 60 ? '⭐⭐' : '⭐';
  const mins = Math.floor(r.time / 60);
  const secs = r.time % 60;
  
  // 关闭管理员面板，显示证书
  document.getElementById('admin').classList.remove('act');
  
  const cert = document.getElementById('cert');
  const cc = document.getElementById('cc');
  cc.innerHTML = `<h2>🏆 探秘证书 🏆</h2><p style="font-size:20px;margin:20px 0;color:#c0392b;">屈原端午亲子公园探秘</p><div class="info"><p><strong>姓名：</strong>${r.name}</p><p><strong>正确率：</strong>${r.score}% ${stars}</p><p><strong>用时：</strong>${mins}分${secs}秒</p><p><strong>日期：</strong>${new Date(r.date).toLocaleDateString('zh-CN')}</p></div><div class="seal">屈原祠<br>纪念</div><p style="font-size:12px;color:#999;margin-top:20px;">线索碎片：${r.clues}个</p><button class="btn" onclick="window.print()">打印证书</button><button class="btn" style="background:#5a8a6a;margin-left:10px;" onclick="document.getElementById('cert').classList.remove('act');showAdmin();">返回管理</button>`;
  cert.classList.add('act');
}

function exportCSV() {
  const recs = JSON.parse(localStorage.getItem('qy_recs') || '[]');
  if (recs.length === 0) return;
  let csv = '\ufeff姓名,正确率,用时(秒),日期,线索数\n';
  recs.forEach(r => { csv += `${r.name},${r.score},${r.time},${r.date},${r.clues}\n`; });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `屈原探秘_${new Date().toLocaleDateString('zh-CN')}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

function clearData() {
  if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
  localStorage.removeItem('qy_recs');
  document.getElementById('admin').classList.remove('act');
  alert('数据已清空');
}

// ============ 初始化 ============
load();
if (!S.started) showStart();
else if (!S.name) showName();
else showLevel();

// 管理员快捷键
let c = 0;
document.querySelector('.hd h1').addEventListener('click', () => { c++; if (c >= 5) { c = 0; showAdmin(); } });
</script>
